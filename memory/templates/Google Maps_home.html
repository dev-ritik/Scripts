{% extends "base.html" %}
{% block title %}Home | Google Maps Insights{% endblock %}

{% block extra_style %}

<style>
html,
body {
    height: 100%;
}

.ig-layout {
    display: flex;
    height: calc(100vh - 60px);
    overflow: hidden;
    background: #f8f9fa;
}

.sidebar {
    width: 360px;
    background: white;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
}

.section-title {
    padding: 16px;
    font-weight: 600;
    font-size: 18px;
}

.place-list {
    flex: 1;
    overflow-y: auto;
}

.place-item {
    padding: 14px 18px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
}

.place-item:hover {
    background: #f5f5f5;
}

.place-name {
    font-weight: 600;
}

.place-visits {
    color: #777;
    font-size: 13px;
    margin-top: 4px;
}

.map-container {
    flex: 1;
    padding: 20px;
    background: #f8f9fa;
    overflow: auto;
}

.map-card {
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    overflow: hidden;
    height: 650px;      /* choose whatever height you like */
}

#map {
    width: 100%;
    height: 100%;
}

</style>
{% endblock %}

{% block content %}
<div class="ig-layout">

    <div class="sidebar">

        <div class="section-title">
            Visited Places
        </div>

        <div id="placeList" class="place-list">
        </div>

    </div>

    <div class="map-container">
    <div class="map-card">
        <div id="map"></div>
    </div>
</div>

</div>
{% endblock %}

{% block extra_head %}
<link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>


    document.addEventListener("DOMContentLoaded", function () {

    const map = L.map("map").setView([22.5, 79], 5);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution: '© OpenStreetMap'
        }
    ).addTo(map);

    loadLocations(map);

});

function loadLocations(map) {
    const request = new XMLHttpRequest();
    request.open("GET", "/Google Maps/get_location_clustering", false); // synchronous
    request.send(null);

    if (request.status !== 200) {
        console.error("Failed to load locations");
        return;
    }

    const places = JSON.parse(request.responseText);

    const sidebar = document.getElementById("placeList");

    const bounds = [];

    places.forEach(function(place) {

        const latlng = [place.latitude, place.longitude];

        bounds.push(latlng);

        const marker = L.marker(latlng)
            .addTo(map)
            .bindPopup(
                "<b>" + place.name + "</b><br>" +
                place.visits + " visits"
            );

        const item = document.createElement("div");
        item.className = "place-item";

        item.innerHTML =
            '<div class="place-name">' + place.name + '</div>' +
            '<div class="place-visits">' + place.visits + ' visits</div>';

        item.onclick = function() {
            map.flyTo(latlng, 15);
            marker.openPopup();
        };

        sidebar.appendChild(item);

    });

    if (bounds.length > 0) {
        map.fitBounds(bounds, {
            padding: [60, 60]
        });
    }

}

</script>
{% endblock %}
