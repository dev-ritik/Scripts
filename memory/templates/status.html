{% extends "base.html" %}
{% block title %}Status | Memory Aggregator{% endblock %}

{% block extra_style %}
<style>
    .status-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 20px;
    }

    /* WhatsApp Chat style card */
    .provider-card {
        background: white;
        border-radius: 0; /* Boxy like chat rows or slightly rounded if contained */
        border-bottom: 1px solid #f0f2f5;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        transition: background-color 0.2s;
        position: relative;
    }

    .provider-card:hover {
        background-color: #f8f9fa;
    }

    .provider-logo {
        width: 48px;
        height: 48px;
        border-radius: 50%; /* Rounded profile picture style */
        object-fit: cover;
        margin-right: 15px;
        background-color: #ece5dd;
    }

    /* Middle section holding text details */
    .provider-details {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .provider-name {
        font-size: 16px;
        font-weight: 600;
        color: #111b21; /* WhatsApp dark text */
        margin-bottom: 4px;
        text-transform: capitalize;
    }

    .date-range {
        font-size: 13px;
        color: #667781; /* WhatsApp secondary text color */
    }

    /* Right section holding status and action link */
    .provider-actions {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .status-badge {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .available {
        background-color: #e6f4ea;
        color: #1e7d34;
    }

    .unavailable {
        background-color: #fdecea;
        color: #c62828;
    }

    /* WhatsApp Styled Navigation Arrow Button */
    .provider-nav-link {
        color: #8696a0; /* Subdued gray arrow */
        font-size: 16px;
        padding: 8px;
        border-radius: 50%;
        transition: color 0.2s, background-color 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .provider-nav-link:hover {
        color: #008069; /* Turns WhatsApp Green on hover */
        background-color: rgba(0, 128, 105, 0.08);
    }

    /* Timeline container tweaks for matching background styling */
    .timeline-container {
        position: relative;
        margin: 20px 0;
        padding-top: 26px;
        background: white;
        border: 1px solid #e6e6e6;
        border-radius: 8px;
        overflow: hidden;
    }

    .timeline-bar {
        position: absolute;
        left: 12px;
        right: 12px;
        height: 4px;
        background: #e0e0e0;
        border-radius: 3px;
        top: 48px;
        z-index: 1;
    }

    .timeline-ticks {
        position: absolute;
        left: 12px;
        right: 12px;
        top: 0;
        height: 48px;
        z-index: 2;
        pointer-events: none;
    }

    .timeline-tick {
        position: absolute;
        height: 12px;
        width: 1px;
        background: #c8c8c8;
        top: 36px;
    }

    .timeline-tick-label {
        position: absolute;
        top: 4px;
        transform: translateX(-50%);
        font-size: 12px;
        color: #666;
        white-space: nowrap;
    }

    .timeline-segment {
        position: absolute;
        height: 18px;
        border-radius: 6px;
        opacity: 0.95;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        top: 0;
        z-index: 3;
        cursor: pointer;
    }

    .timeline-segment:hover {
        transform: translateY(-2px);
    }

    .timeline-label {
        position: absolute;
        left: 0;
        font-size: 12px;
        color: #111;
        transform: translateY(-22px);
        white-space: nowrap;
        z-index: 4;
        background: rgba(255, 255, 255, 0.9);
        padding: 1px 6px;
        border-radius: 4px;
    }

    .timeline-tooltip {
        position: absolute;
        display: none;
        z-index: 30;
        background: #fff;
        border: 1px solid #ddd;
        padding: 8px 10px;
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        font-size: 13px;
        color: #111;
    }
</style>
{% endblock %}

{% block content %}
<h2>📊 Provider Status</h2>
<p style="color: #667781;">Here’s an overview of all connected data providers and their availability.</p>
<div id="timelineContainer" class="timeline-container" role="region" aria-label="Provider timeline">
    <div id="timelineBar" class="timeline-bar" aria-hidden="true"></div>
    <div id="timelineTicks" class="timeline-ticks" aria-hidden="true"></div>
</div>
<div id="statusGrid" class="status-grid"></div>

<script>
    function renderTimeline(providers, options = {}) {
        const containerId = options.containerId || 'timelineContainer';
        const tickInterval = options.tickInterval || 'year';

        const container = document.getElementById(containerId);
        if (!container) return;

        const preserveIds = new Set(['timelineBar', 'timelineTicks']);
        Array.from(container.children).forEach(child => {
            if (!preserveIds.has(child.id)) child.remove();
        });

        const timelineBar = document.getElementById('timelineBar');
        const ticksContainer = document.getElementById('timelineTicks');
        const now = new Date();

        const providerList = Object.entries(providers).map(([name, info]) => {
            const start = info && info.start_date ? parseDate(info.start_date) : null;
            const end = info && info.end_date ? parseDate(info.end_date) : now;
            return {name, info, start, end};
        }).filter(p => p.start);

        if (providerList.length === 0) {
            const fallback = document.createElement('div');
            fallback.className = 'timeline-label';
            fallback.innerText = 'No providers with start dates';
            fallback.style.top = '80px';
            fallback.style.left = '12px';
            container.appendChild(fallback);
            container.style.height = '140px';
            return;
        }

        providerList.sort((a, b) => a.start - b.start || (a.end - b.end));

        let minDateMs = Math.min(...providerList.map(p => p.start.getTime()));
        let maxDateMs = Math.max(...providerList.map(p => (p.end || now).getTime()));

        if (now.getTime() > maxDateMs) maxDateMs = now.getTime();

        const padMs = Math.max(24 * 3600 * 1000, (maxDateMs - minDateMs) * 0.02);
        minDateMs -= padMs;
        maxDateMs += padMs;

        let range = maxDateMs - minDateMs;
        if (range <= 0) range = 24 * 3600 * 1000;

        const rows = [];
        const placements = [];

        providerList.forEach(p => {
            const startMs = p.start.getTime();
            const endMs = (p.end || now).getTime();

            let rowIndex = rows.findIndex(lastEnd => startMs >= lastEnd);
            if (rowIndex === -1) {
                rowIndex = rows.length;
                rows.push(endMs);
            } else {
                rows[rowIndex] = endMs;
            }
            placements.push({...p, startMs, endMs, row: rowIndex});
        });

        const rowHeight = 36;
        const topOffset = 80;
        const leftPadding = 12;
        const rightPadding = 12;

        const containerHeight = topOffset + rows.length * rowHeight;
        container.style.height = containerHeight + 'px';

        if (timelineBar) {
            timelineBar.style.left = leftPadding + 'px';
            timelineBar.style.right = rightPadding + 'px';
            timelineBar.style.top = (topOffset - 30) + 'px';
        }

        if (ticksContainer) {
            ticksContainer.innerHTML = '';
            ticksContainer.style.left = leftPadding + 'px';
            ticksContainer.style.right = rightPadding + 'px';
        }

        if (tickInterval === 'year') {
            const minYear = new Date(minDateMs).getFullYear();
            const maxYear = new Date(maxDateMs).getFullYear();
            for (let y = minYear; y <= maxYear; y++) {
                const tickDate = new Date(y, 0, 1).getTime();
                const pct = ((tickDate - minDateMs) / range) * 100;
                if (pct < -5 || pct > 105) continue;
                const tick = document.createElement('div');
                tick.className = 'timeline-tick';
                tick.style.left = pct + '%';
                ticksContainer.appendChild(tick);

                const lbl = document.createElement('div');
                lbl.className = 'timeline-tick-label';
                lbl.style.left = pct + '%';
                lbl.innerText = String(y);
                ticksContainer.appendChild(lbl);
            }
        }

        function colorForName(name) {
            let h = 0;
            for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
            return `hsl(${h % 360} 65% 48%)`;
        }

        placements.forEach(p => {
            const startPct = ((p.startMs - minDateMs) / range) * 100;
            const endPct = ((p.endMs - minDateMs) / range) * 100;
            const widthPct = Math.max(0.3, endPct - startPct);

            const seg = document.createElement('div');
            seg.className = 'timeline-segment';
            seg.setAttribute('tabindex', '0');
            seg.setAttribute('role', 'img');
            seg.style.left = startPct + '%';
            seg.style.width = widthPct + '%';
            seg.style.background = colorForName(p.name);
            const top = topOffset + p.row * rowHeight - 10;
            seg.style.top = top + 'px';

            const tooltip = document.createElement('div');
            tooltip.className = 'timeline-tooltip';
            tooltip.innerHTML = `<strong>${p.name.replace(/_/g, ' ')}</strong><div style="margin-top:6px">${formatDateLabel(new Date(p.startMs))} — ${formatDateLabel(new Date(p.endMs))}</div>`;

            const label = document.createElement('div');
            label.className = 'timeline-label';
            label.innerText = p.name.replace(/_/g, ' ');
            label.style.left = startPct + '%';
            label.style.top = (top + 18) + 'px';

            container.appendChild(seg);
            container.appendChild(tooltip);
            container.appendChild(label);

            seg.addEventListener('mousemove', (ev) => {
                const rect = container.getBoundingClientRect();
                const tRect = tooltip.getBoundingClientRect();
                const x = Math.min(rect.width - tRect.width - 8, Math.max(8, ev.clientX - rect.left + 8));
                const y = Math.max(8, ev.clientY - rect.top - tRect.height - 12);
                tooltip.style.left = x + 'px';
                tooltip.style.top = y + 'px';
                tooltip.style.display = 'block';
            });
            seg.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
        });

        function parseDate(s) {
            const d = new Date(s);
            if (isNaN(d.getTime())) {
                const parts = String(s).split('-').map(Number);
                if (parts.length >= 3) return new Date(parts[0], parts[1] - 1, parts[2]);
                return null;
            }
            return d;
        }

        function formatDateLabel(d) {
            if (!d || !(d instanceof Date)) return '';
            return d.toLocaleDateString(undefined, {year: 'numeric', month: 'short', day: 'numeric'});
        }
    }

    function formatName(name) {
        return name.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatDateLabel(dateStr) {
        if (!dateStr) return null;
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        return d.toLocaleDateString("en-US", {month: "short", day: "numeric", year: "numeric"});
    }

    function createProviderCard(name, info, supportsPage) {
        const card = document.createElement("div");
        card.className = "provider-card";

        const start = formatDateLabel(info.start_date);
        const end = formatDateLabel(info.end_date);

        // Standard Left Profile and Center Details
        let innerHTML = `
            <img src="${info.logo || ''}" alt="${name} logo" class="provider-logo">
            <div class="provider-details">
                <div class="provider-name">${formatName(name)}</div>
                <div class="date-range">
                    ${start && end ? `${start} → ${end}` : "No date range available"}
                </div>
            </div>
            <div class="provider-actions">
                <div class="status-badge ${info.available ? "available" : "unavailable"}">
                    ${info.available ? "Available" : "Unavailable"}
                </div>
        `;

        // Append conditional arrow on the right if API states true
        if (supportsPage === true) {
            innerHTML += `
                <a href="/${encodeURIComponent(name)}/home" class="provider-nav-link" title="View details">
                    <i class="fas fa-chevron-right"></i>
                </a>
            `;
        }

        innerHTML += `</div>`;
        card.innerHTML = innerHTML;
        return card;
    }

    async function renderProviders() {
        const container = document.getElementById("statusGrid");
        container.innerHTML = "";

        // Fetch both endpoints concurrently
        const [statusRes, supportsPageRes] = await Promise.all([
            fetch("/status_data"),
            fetch("/supports_home")
        ]);

        const providers = await statusRes.json();
        const supportsPageData = await supportsPageRes.json();

        renderTimeline(providers);

        Object.entries(providers).forEach(([name, info]) => {
            const supportsPage = supportsPageData && supportsPageData[name];
            container.appendChild(createProviderCard(name, info, supportsPage));
        });
    }

    renderProviders();
</script>
{% endblock %}
